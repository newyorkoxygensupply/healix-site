<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<meta name="description" content="{{ description }}">
<link rel="canonical" href="{{ canonical }}">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:title" content="{{ title }}">
<meta property="og:description" content="{{ description }}">
<meta property="og:url" content="{{ canonical }}">
<meta property="og:site_name" content="{{ site_name }}">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "url": {{ canonical|tojson }},
  "name": {{ title|tojson }},
  "description": {{ description|tojson }},
  "isPartOf": {"@type":"WebSite","url":{{ site_url|tojson }}}
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css?v=3">
<style>
.brands-page{max-width:1200px;margin:0 auto;padding:32px 20px}
.page-hero{margin-bottom:36px}
h1.page-title{font-family:var(--font-display);font-size:40px;letter-spacing:-0.03em;margin-bottom:8px}
.page-subtitle{color:var(--gray-400);font-size:16px}
.brands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.brand-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;text-decoration:none;color:inherit;transition:.15s;display:block}
.brand-card:hover{border-color:var(--cobalt);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.brand-card-name{font-size:17px;font-weight:600;color:var(--navy);margin-bottom:6px}
.brand-card-desc{font-size:13px;color:var(--gray-400);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.brand-card-count{font-size:12px;font-weight:600;color:var(--cobalt)}
</style>
</head>
<body>
<header class="header" role="banner">
  <div class="header-inner">
    <a class="logo" href="/" aria-label="{{ site_name }} — Home">
      <div class="logo-icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
      <span class="logo-text">{{ site_name }}</span>
    </a>
    <div class="header-search" role="search">
      <form action="/" method="get">
        <input type="search" name="q" placeholder="Search medical supplies…" autocomplete="off">
        <button type="submit" aria-label="Search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      </form>
    </div>
  </div>
</header>
<div class="brands-page">
  <nav style="font-size:13px;color:var(--gray-400);margin-bottom:20px">
    <a href="/" style="color:var(--cobalt);text-decoration:none">Home</a> › <span>Brands</span>
  </nav>
  <div class="page-hero">
    <h1 class="page-title">All Medical Supply Brands</h1>
    <p class="page-subtitle">{{ brands|length }} brands — shop by manufacturer</p>
  </div>
  <div class="brands-grid">
    {% for b in brands %}
    <a class="brand-card" href="/brand/{{ b.slug }}">
      <div class="brand-card-name">{{ b.name }}</div>
      {% if b.desc %}<div class="brand-card-desc">{{ b.desc }}</div>{% endif %}
      <div class="brand-card-count">{{ b.count|format_thousands }} products →</div>
    </a>
    {% endfor %}
  </div>
</div>
</body>
</html>
