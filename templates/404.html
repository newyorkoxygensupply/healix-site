<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} | {{ site_name }}</title>
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css?v=3">
<style>
.error-page{max-width:600px;margin:80px auto;padding:0 20px;text-align:center}
.error-code{font-size:80px;font-weight:700;color:var(--border2);line-height:1}
h1{font-family:var(--font-display);font-size:28px;margin:16px 0 8px}
p{color:var(--ink2);margin-bottom:24px}
.btn{display:inline-block;background:var(--accent);color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a class="logo" href="/"><span class="logo-icon">✦</span>      <div class="logo-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <span class="logo-text">{{ site_name }}</span></a>
  </div>
</header>
<div class="error-page">
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a class="btn" href="/">Browse All Products</a>
</div>
</body>
</html>
